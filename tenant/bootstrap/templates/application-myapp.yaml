apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-{{ .Values.tenant.name }}
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants
  source:
    repoURL: {{ .Values.myapp.git.repoURL }}
    targetRevision: {{ .Values.myapp.git.targetRevision }}
    path: {{ .Values.myapp.git.path }}
    helm:
      values: |
        tenant:
        {{- .Values.tenant | toYaml | nindent 12 }}
        myapp:
        {{- .Values.myapp | toYaml | nindent 12 }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

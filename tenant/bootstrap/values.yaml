# Default values for tenant/bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# defaults
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/ci-template-gitops.git
  targetRevision: main

deployer:
  domain: apps.cluster-guid.example.com
  apiUrl: https://api.cluster-guid.example.com:6443
  guid: GUID

tenant:
  name: GUID
  user:
    name: USERNAME

labs:
  ocpOps:
    enabled: true
    git:
      path: tenant/ocpOps
      <<: *git_defaults

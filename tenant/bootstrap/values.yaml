# Default values for tenant/bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# defaults
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/ci-template-gitops.git
  targetRevision: main

deployer:
  domain: apps.cluster-guid.example.com
  apiUrl: https://api.cluster-guid.example.com:6443
  guid: GUID

tenant:
  name: GUID
  user:
    name: USERNAME

example2HelmBasic:
  git:
    path: tenant/example2-helm-basic
    <<: *git_defaults
  namespace: example2-USERNAME

example1InlineResource:
  namespace: example1-USERNAME

labs:
  example3HelmParameterized:
    enabled: false
    git:
      path: tenant/labs/example3-helm-parameterized
      <<: *git_defaults
    namespace: default
    message: "Hello from DEFAULT values - edit catalog to override me!"
    replicas: 1
    imageTag: "latest"

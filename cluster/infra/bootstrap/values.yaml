# Default values for bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# defaults
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/ci-template-gitops.git
  targetRevision: main

deployer:
  domain: apps.cluster-guid.sandbox.opentlc.com
  apiUrl: https://api.cluster-guid.sandbox.opentlc.com:6443

# call the platform layer, you need this.
platform:
  enabled: true
  git:
    path: cluster/platform/bootstrap
    <<: *git_defaults

defaultStorageclass:
  enabled: true
  git:
    path: cluster/infra/default-storageclass
    <<: *git_defaults

kubevirtOperator:
  enabled: false
  git:
    path: cluster/infra/kubevirt-operator
    <<: *git_defaults

mtcOperator:
  enabled: false
  git:
    path: cluster/infra/mtc-operator
    <<: *git_defaults

mtvOperator:
  enabled: false
  git:
    path: cluster/infra/mtv-operator
    <<: *git_defaults

nodeHealthCheckOperator:
  enabled: false
  git:
    path: cluster/infra/node-health-check-operator
    <<: *git_defaults

selfNodeRemediationOperator:
  enabled: false
  git:
    path: cluster/infra/self-node-remediation-operator
    <<: *git_defaults

rhoaiOperator:
  enabled: false
  git:
    path: cluster/infra/rhoai-operator
    <<: *git_defaults

deschedulerOperator:
  enabled: false
  git:
    path: cluster/infra/descheduler-operator
    <<: *git_defaults

# Values passed through verbatim to platform/bootstrap.
# Use this to configure platform apps from the catalog without
# infra/bootstrap needing to know about each one.
platformValues: {}

### Keycloak automation.  You probably don't need this.
keycloakInfra:
  enabled: false
  git:
    path: cluster/infra/keycloak/keycloak-infra
    <<: *git_defaults

keycloakResources:
  enabled: false
  git:
    path: cluster/infra/keycloak/keycloak-resources
    <<: *git_defaults
